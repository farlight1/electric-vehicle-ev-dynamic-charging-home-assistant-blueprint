blueprint:
  name: Dynamic EV Charging Automation v2.4
  description: >
    **v2.4 - Safe Resume & Memory Tracking**
    - The automation will now NEVER start the charge automatically just because the car is plugged in.
    - Added an optional `input_boolean` helper input to "remember" if the automation paused the charge.
    - It will only auto-resume charging if it was the one that stopped it due to low power.

    **v2.3 - Improved real power tracking & safe toggling**
    - Added optional real-time power (W) and current (A) sensors for accurate load calculation.
    - Conditional start/stop to prevent redundant network calls.

    **v2.2 - Optional location tracker**
    - The Car/Person Location Tracker is now optional
    - Leave it empty to disable location-based checks
    - Useful for shared chargers, multi-vehicle households, or when
      the charger may serve cars not linked to the configured tracker

    **v2.1 - Added case-insensitive charging status support**
    - Added support for "Charging" (capital C) status from ESPhome Tesla BLE
    - Improved status detection to support multiple case variations

    **v2.0 - Added start/stop control and fixed power calculation**
    - Added charger toggle control for start/stop
    - Fixed power calculation formula
    - Added gradual adjustment to prevent charger errors
    - Improved oscillation prevention

    This automation dynamically adjusts the charging current of an electric vehicle (EV) based on the total power consumption in the household.
    It ensures that the EV charger does not exceed the available power, preventing overloads and optimizing energy usage. The system continuously monitors home power consumption and regulates the charging rate accordingly.
    You can configure two different charging periods (Day and Night) if your electricity contract has varying power limits at different times.
    Depending on what you have exposed in Home Assistant you could target your car or your charger. Works with any EV charger that supports amperage control via Home Assistant.

  domain: automation
  input:
    interval:
      name: Adjustment Interval (minutes)
      description: Interval in minutes to adjust the charging amperage dynamically.
      default: /1
      selector:
        select:
          options:
            - label: "1 minute"
              value: /1
            - label: "3 minutes"
              value: /3
            - label: "5 minutes"
              value: /5
    device_tracker:
      name: Car/Person Location Tracker (Optional)
      description: Optional entity that determines whether the electric vehicle (EV) is at home.
      default: ""
      selector:
        entity:
          domain: device_tracker
    sensor_charging:
      name: EV Charging Sensor
      description: Sensor that detects whether the electric vehicle (EV) is currently charging.
      default: sensor.ev_charger_estado
      selector:
        entity:
          domain: sensor
    charger_toggle:
      name: EV Charging Toggle (Start/Stop)
      description: Select entity that controls the charging state of the EV charger.
      default: select.ev_charger_toggle_charging
      selector:
        entity:
          domain: select
    pause_helper:
      name: Ayudante de Memoria de Pausa (input_boolean)
      description: >
        **CRÍTICO PARA LA SEGURIDAD:** Selecciona aquí el Ayudante de tipo 'Interruptor' (input_boolean) que has creado. 
        Servirá de "memoria" para que la automatización sepa si fue ella quien detuvo la carga. Así, nunca iniciará la carga automáticamente al enchufar el coche, solo la reanudará si la pausó previamente.
      default: ""
      selector:
        entity:
          domain: input_boolean
    sensor_charger_power:
      name: Real Charger Power Sensor (Optional)
      description: Sensor that measures the actual real-time power (W) consumed by the charger. Highly recommended for accuracy.
      default: ""
      selector:
        entity:
          domain: sensor
          device_class: power
    sensor_charger_current:
      name: Real Charger Current Sensor (Optional)
      description: Sensor that measures the actual real-time amps (A) used by the charger.
      default: ""
      selector:
        entity:
          domain: sensor
          device_class: current
    sensor_house_power:
      name: Total Power Consumption Sensor
      description: Sensor that measures the total power consumption of the household in real-time.
      default: sensor.shellyemg3_8cbfea96acd8_em1_power
      selector:
        entity:
          domain: sensor
          device_class: power
    max_grid_power_day:
      name: Maximum Grid Power during the day (W)
      default: 4700
      selector:
        number:
          min: 0
          max: 15000
          step: 100
    max_grid_power_night:
      name: Maximum Grid Power during the night (W)
      default: 6200
      selector:
        number:
          min: 0
          max: 15000
          step: 100
    charging_current:
      name: Charging Current Control
      description: Entity that controls the charging amperage of the electric vehicle (EV).
      default: number.ev_charger_set_charge_current
      selector:
        entity:
          domain: number
    voltage:
      name: Voltage
      description: Voltage used in your location (e.g., 120V for USA, 230V for EU)
      default: 230
      selector:
        number:
          min: 100
          max: 240
          step: 10
    max_amps:
      name: Maximum amps
      default: 20
      selector:
        number:
          min: 6
          max: 32
          step: 1
    min_amps:
      name: Minimum amps
      default: 8
      selector:
        number:
          min: 6
          max: 32
          step: 1
    day_time_days:
      name: Day Time Active Days
      default:
        - mon
        - tue
        - wed
        - thu
        - fri
      selector:
        select:
          multiple: true
          options:
            - label: Monday
              value: "mon"
            - label: Tuesday
              value: "tue"
            - label: Wednesday
              value: "wed"
            - label: Thursday
              value: "thu"
            - label: Friday
              value: "fri"
            - label: Saturday
              value: "sat"
            - label: Sunday
              value: "sun"
    day_time_start:
      name: Day Time Start Hour
      default: 8
      selector:
        number:
          min: 0
          max: 23
          step: 1
    day_time_end:
      name: Day Time End Hour
      default: 24
      selector:
        number:
          min: 0
          max: 24
          step: 1

triggers:
  - trigger: time_pattern
    minutes: !input interval

variables:
  device_tracker_input: !input device_tracker

condition:
  - condition: and
    conditions:
      - condition: template
        value_template: >
          {% if device_tracker_input in [none, '', 'none'] %}
            true
          {% else %}
            {{ is_state(device_tracker_input, 'home') }}
          {% endif %}
      - condition: state
        entity_id: !input sensor_charging
        state:
          - 'charging'
          - 'charged'
          - 'plugged_in'
          - 'Charging'
          - 'CHARGING'

action:
  - variables:
      voltage: !input voltage
      max_amps: !input max_amps
      min_amps: !input min_amps
      sensor_house_power_entity: !input sensor_house_power
      sensor_charger_power_entity: !input sensor_charger_power
      sensor_charger_current_entity: !input sensor_charger_current
      charging_current_entity: !input charging_current
      sensor_charging_entity: !input sensor_charging
      charger_toggle_entity: !input charger_toggle
      pause_helper_entity: !input pause_helper
      charging_current_value: "{{ states(charging_current_entity) | float(0) }}"
      grid_power: "{{ states(sensor_house_power_entity) | float(0) }}"
      total_consumption: "{{ states(sensor_house_power_entity) | float(0) }}"
      charger_consumption: |-
        {% set state = states(sensor_charging_entity) | lower %}
        {% if state in ['charging', 'plugged_in', 'waiting_for_authorization', 'waiting'] %}
          {% if sensor_charger_power_entity != "" and states(sensor_charger_power_entity) not in ['unknown', 'unavailable'] %}
            {{ states(sensor_charger_power_entity) | float(0) }}
          {% elif sensor_charger_current_entity != "" and states(sensor_charger_current_entity) not in ['unknown', 'unavailable'] %}
            {{ states(sensor_charger_current_entity) | float(0) * voltage }}
          {% else %}
            {{ charging_current_value * voltage }}
          {% endif %}
        {% else %}
          0
        {% endif %}
      max_grid_power_day: !input max_grid_power_day
      max_grid_power_night: !input max_grid_power_night
      day_time_days: !input day_time_days
      day_time_start: !input day_time_start
      day_time_end: !input day_time_end
      current_day: "{{ ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'][now().weekday()] }}"
      is_day_time: "{{ current_day in day_time_days and day_time_start <= now().hour < day_time_end }}"
      actual_free_power: |-
        {% if is_day_time %}
          {{ [0, max_grid_power_day - total_consumption + charger_consumption] | max }}
        {% else %}
          {{ [0, max_grid_power_night - total_consumption + charger_consumption] | max }}
        {% endif %}
      new_target_value: >-
        {% set raw_amps = (actual_free_power / voltage) | float %}
        {% if raw_amps > max_amps %}
          {{ max_amps | float }}
        {% elif raw_amps < min_amps %}
          0.0
        {% else %}
          {{ raw_amps | int }}
        {% endif %}

  # First: Control charging state conditionally with Memory Tracker (Start/Stop)
  - choose:
      # Option 1: We have enough power, car is NOT charging, AND the automation paused it previously
      - conditions:
          - condition: template
            value_template: >-
              {% set is_charging = states(sensor_charging_entity) | lower == 'charging' %}
              {% set enough_power = (actual_free_power / voltage) >= min_amps %}
              {% if pause_helper_entity not in [none, '', 'none'] %}
                {{ enough_power and not is_charging and is_state(pause_helper_entity, 'on') }}
              {% else %}
                false
              {% endif %}
        sequence:
          - service: select.select_option
            target:
              entity_id: !input charger_toggle
            data:
              option: >-
                {% set opciones_validas = state_attr(charger_toggle_entity, 'options') | default([]) %}
                {{ 'start_charging' if 'start_charging' in opciones_validas else 'Start charging' }}
          - if:
              - condition: template
                value_template: "{{ pause_helper_entity not in [none, '', 'none'] }}"
            then:
              - service: input_boolean.turn_off
                target:
                  entity_id: !input pause_helper

      # Option 2: We do NOT have enough power but the car IS charging -> Send Stop and Save to Memory
      - conditions:
          - condition: template
            value_template: >-
              {% set is_charging = states(sensor_charging_entity) | lower == 'charging' %}
              {% set enough_power = (actual_free_power / voltage) >= min_amps %}
              {{ not enough_power and is_charging }}
        sequence:
          - service: select.select_option
            target:
              entity_id: !input charger_toggle
            data:
              option: >-
                {% set opciones_validas = state_attr(charger_toggle_entity, 'options') | default([]) %}
                {{ 'stop_charging' if 'stop_charging' in opciones_validas else 'Stop charging' }}
          - if:
              - condition: template
                value_template: "{{ pause_helper_entity not in [none, '', 'none'] }}"
            then:
              - service: input_boolean.turn_on
                target:
                  entity_id: !input pause_helper

      # Option 3: Reset memory if user manually started charging and power is sufficient
      - conditions:
          - condition: template
            value_template: >-
              {% set is_charging = states(sensor_charging_entity) | lower == 'charging' %}
              {% set enough_power = (actual_free_power / voltage) >= min_amps %}
              {% if pause_helper_entity not in [none, '', 'none'] %}
                {{ enough_power and is_charging and is_state(pause_helper_entity, 'on') }}
              {% else %}
                false
              {% endif %}
        sequence:
          - service: input_boolean.turn_off
            target:
              entity_id: !input pause_helper

  - repeat:
      while:
        - condition: template
          value_template: >-
            {% set current_amps = states(charging_current_entity) | float %}
            {% set diff = (current_amps - (new_target_value | float)) | abs %}
            {{ diff >= 1 }}
      sequence:
        - service: number.set_value
          target:
            entity_id: !input charging_current
          data:
            value: >-
              {% set current_amps = states(charging_current_entity) | float %}
              {% if current_amps < (new_target_value | float) %}
                {{ current_amps + 1 }}
              {% elif current_amps > (new_target_value | float) %}
                {{ [current_amps - 1, min_amps] | max }}
              {% else %}
                {{ new_target_value }}
              {% endif %}
        - delay:
            seconds: 5

mode: restart